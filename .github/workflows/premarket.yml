name: Morning Report

# 05:00 UTC = 08:00 Israel time — the user's daily 8 AM package: goal-price alerts
# (one dedicated message each), watchlist status page, news scan, and the full
# market scan with the top-10 best setups. Runs every day (weekends re-report the
# last close). GitHub cron can fire up to ~1h late under load.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

concurrency:
  group: morning-report
  cancel-in-progress: false

permissions:
  contents: write             # commit alert_history.json (the pick-repeat cooldown state)

jobs:
  run-morning-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests anthropic

      - name: Run morning report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_MODEL: "claude-sonnet-4-6"
        run: python morning_report.py

      - name: Persist alert history (pick-repeat cooldown)
        if: ${{ always() }}
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add alert_history.json || true
          if git diff --cached --quiet; then
            echo "No history changes."
            exit 0
          fi
          git commit -m "Update alert history [skip ci]"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            git pull --rebase --autostash origin main || true
            sleep $((i * 2))
          done
          echo "::warning::alert-history push failed — picks may repeat tomorrow"
