name: Morning Report

# The user's daily 8 AM (Israel) package: goal-price alerts, watchlist page, news
# scan, and the top-10 market scan. GitHub's scheduler consistently fires 2-3.5h
# LATE, so the primary cron is set to 03:00 UTC so the run actually lands ~05:00-
# 06:30 UTC (~8:00-9:30 Israel). The second cron is a backup in case the first
# never fires — morning_report.py skips itself if today's report already went out.
on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "30 5 * * *"
  workflow_dispatch: {}

concurrency:
  group: morning-report
  cancel-in-progress: false

permissions:
  contents: write             # commit alert_history.json (the pick-repeat cooldown state)

jobs:
  run-morning-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests anthropic

      - name: Run morning report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_MODEL: "claude-sonnet-4-6"
        run: python morning_report.py

      - name: Persist alert history (pick-repeat cooldown)
        if: ${{ always() }}
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add alert_history.json || true
          if git diff --cached --quiet; then
            echo "No history changes."
            exit 0
          fi
          git commit -m "Update alert history [skip ci]"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            git pull --rebase --autostash origin main || true
            sleep $((i * 2))
          done
          echo "::warning::alert-history push failed — picks may repeat tomorrow"
