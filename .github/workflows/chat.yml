name: Stock Chat Bot

on:
  schedule:
    - cron: "*/5 * * * *"     # poll Telegram every 5 minutes (runs on GitHub's cloud, no computer needed)
  workflow_dispatch: {}

# Don't let two polls run at once (they'd double-answer messages).
concurrency:
  group: stock-chat-bot
  cancel-in-progress: false

permissions:
  contents: write             # needed to commit the trade journal back

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests anthropic

      - name: Run chat bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # optional — unlocks the AI opinion
        run: python chat_bot.py

      - name: Persist trade journal & state
        run: |
          git config user.name "stock-chat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bot_state.json trades.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update chat bot state [skip ci]"
            git push
          fi
