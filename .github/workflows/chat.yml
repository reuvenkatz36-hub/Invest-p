name: Stock Chat Bot

on:
  # The bot keeps ITSELF alive: each run polls Telegram for ~55 min, then dispatches the
  # next run (see the "Relaunch" step) — a continuous chain so replies are near-instant.
  # The cron below is only a cold-start safety net in case the chain ever dies (GitHub's
  # scheduler is unreliable, so we don't depend on it). Public repo => Actions is free.
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch: {}

# One poller at a time. cancel-in-progress: true means a relaunch/cron/manual run replaces
# the current one instead of queueing — so the chain can never multiply into many runs.
concurrency:
  group: stock-chat-bot
  cancel-in-progress: true

permissions:
  contents: write             # needed to commit the trade journal back
  actions: write              # needed to launch the daily scan (/daily) and relaunch itself

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests anthropic

      - name: Run chat bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # optional — unlocks the AI opinion
          CHAT_MODEL: "claude-sonnet-4-6"   # latest Sonnet — the AI brain for opinions & /learn
          POLL_SECONDS: "3300"   # stay awake ~55 min per run for near-instant replies
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lets /daily dispatch the daily-scan workflow
          DAILY_WORKFLOW: "main.yml"
        run: python chat_bot.py

      # always() so state survives even when this run is CANCELLED by the next poller
      # taking over (concurrency cancel-in-progress) — otherwise watchlist adds and
      # trades logged during the run are silently lost.
      - name: Persist trade journal & state
        if: ${{ always() }}
        run: |
          git config user.name "stock-chat-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add bot_state.json trades.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update chat bot state [skip ci]"
          for i in 1 2 3 4; do
            if git push; then
              exit 0
            fi
            echo "push failed (attempt $i) — rebasing and retrying"
            git pull --rebase --autostash origin main || true
            sleep $((i * 2))
          done
          echo "::warning::chat-bot state push failed after retries — watchlist/trade changes from this run may be lost"
          exit 1

      - name: Relaunch (keep the bot alive)
        if: success()
        run: |
          sleep 3
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/chat.yml/dispatches" \
            -d '{"ref":"main"}'
