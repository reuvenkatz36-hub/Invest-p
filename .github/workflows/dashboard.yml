name: Build Dashboard

# Regenerates the encrypted dashboard data (docs/data/dashboard.enc) that the GitHub Pages
# site reads. Runs a few times a day and on demand. Pages serves /docs, so committing the
# new data file updates the live site automatically.
on:
  schedule:
    - cron: "23 */4 * * *"     # every ~4 hours
  workflow_dispatch: {}

concurrency:
  group: build-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance requests pandas anthropic cryptography
      - name: Build encrypted dashboard data
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_MODEL: "claude-sonnet-4-6"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python build_dashboard.py
      - name: Commit data
        run: |
          git config user.name "stock-dashboard"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/dashboard.enc
          if git diff --cached --quiet; then
            echo "No dashboard changes."
          else
            git commit -m "Update dashboard data [skip ci]"
            git pull --rebase --autostash origin main || true
            git push || true
          fi
