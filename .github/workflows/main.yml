name: Stock Signal Bot

# No schedule of its own anymore: the full scan runs inside the 8 AM Morning Report
# (premarket.yml). This workflow remains for on-demand runs via the /daily command.
on:
  workflow_dispatch: {}

permissions:
  contents: write             # commit alert_history.json (the pick-repeat cooldown state)

jobs:
  run-signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests anthropic

      - name: Run signal bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # lets the X-ray use Sonnet
          CHAT_MODEL: "claude-sonnet-4-6"
        run: python signal_bot.py

      - name: Persist alert history (pick-repeat cooldown)
        if: ${{ always() }}
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add alert_history.json || true
          if git diff --cached --quiet; then
            echo "No history changes."
            exit 0
          fi
          git commit -m "Update alert history [skip ci]"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            git pull --rebase --autostash origin main || true
            sleep $((i * 2))
          done
          echo "::warning::alert-history push failed — picks may repeat tomorrow"
