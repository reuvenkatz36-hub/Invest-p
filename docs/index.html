<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>📈 My Stock Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#eef1f6;--card:#ffffff;--txt:#1a1d24;--mut:#6b7280;--line:#e6e8ee;
    --grn:#16a34a;--red:#dc2626;--accent:#2563eb;--shadow:0 1px 3px rgba(20,30,60,.08),0 6px 18px rgba(20,30,60,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:16px;}
  .mut{color:var(--mut)} .grn{color:var(--grn)} .red{color:var(--red)} .small{font-size:12px}
  a{color:var(--accent);text-decoration:none}

  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  header h1{font-size:20px;margin:0}
  .total{font-size:34px;font-weight:800;line-height:1}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;
    box-shadow:var(--shadow);cursor:pointer;transition:transform .08s ease}
  .card:active{transform:scale(.99)}
  .card h2{font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:var(--mut);margin:0 0 10px}
  .card .more{float:right;color:var(--accent);font-size:12px;font-weight:600}
  .graph{grid-column:span 7} .summary{grid-column:span 5}
  .holdings{grid-column:span 6} .watch{grid-column:span 6} .news{grid-column:span 12}
  @media(max-width:780px){.card{grid-column:span 12 !important}}

  .chips{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .chip{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
  .chip .v{font-size:16px;font-weight:800;display:block} .chip .k{font-size:11px;color:var(--mut)}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
  .kv:last-child{border:0}
  table{width:100%;border-collapse:collapse}
  td,th{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase}
  .badge{display:inline-block;min-width:30px;text-align:center;border-radius:8px;padding:2px 7px;font-weight:800;font-size:13px;color:#fff}
  .news-sum{white-space:pre-wrap}

  /* modal */
  #modal{position:fixed;inset:0;background:rgba(15,20,35,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
  #modal.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:760px;max-height:88vh;overflow:auto;border-radius:20px 20px 0 0;padding:18px}
  @media(min-width:780px){#modal{align-items:center}.sheet{border-radius:20px}}
  .sheet h2{margin:0 0 12px;font-size:18px}
  .x{float:right;border:0;background:var(--bg);border-radius:10px;width:34px;height:34px;font-size:18px;cursor:pointer}

  /* login */
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;padding:24px;text-align:center;z-index:9999}
  input[type=password]{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px;width:min(320px,82vw);font:inherit}
  button.go{background:var(--accent);border:0;color:#fff;font-weight:700;border-radius:12px;padding:13px 22px;cursor:pointer;font:inherit}
</style>
</head>
<body>

<div id="login">
  <h1>📈 My Stock Dashboard</h1>
  <p class="mut">Enter your password to unlock.</p>
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button class="go" onclick="unlock()">Unlock</button>
  <p id="err" class="red small"></p>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <header>
      <div><h1>📈 Dashboard</h1><span class="mut small" id="updated"></span></div>
      <div style="text-align:right"><div class="mut small">Account value</div>
        <div class="total" id="equity">—</div><div class="small" id="subpnl"></div></div>
    </header>

    <div class="grid">
      <div class="card graph" onclick="openModal('graph')">
        <h2>Performance <span class="more">tap to expand ›</span></h2>
        <canvas id="chart" height="170"></canvas>
      </div>

      <div class="card summary" onclick="openModal('summary')">
        <h2>Profit by period <span class="more">details ›</span></h2>
        <div class="chips" id="chips"></div>
        <div id="quickstats" style="margin-top:12px"></div>
      </div>

      <div class="card holdings" onclick="openModal('holdings')">
        <h2>Holdings <span class="more">details ›</span></h2>
        <table id="holdMini"></table>
      </div>

      <div class="card watch" onclick="openModal('watch')">
        <h2>Watchlist <span class="more">details ›</span></h2>
        <table id="watchMini"></table>
      </div>

      <div class="card news" onclick="openModal('news')">
        <h2>News — what matters this week <span class="more">all headlines ›</span></h2>
        <div class="news-sum" id="newsMini" dir="auto"></div>
      </div>
    </div>
    <p class="mut small" style="text-align:center;margin:18px 0">Not financial advice · best-effort free data</p>
  </div>
</div>

<div id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="sheet"><button class="x" onclick="closeModal()">×</button><div id="modalbody"></div></div>
</div>

<script>
let DATA=null, chart=null, modalChart=null;
const money=n=> (n>=0?"+":"−")+"$"+Math.abs(n).toLocaleString(undefined,{maximumFractionDigits:0});
const cls=n=> n>=0?"grn":"red";
const sc=s=> s==null?"#9ca3af": s>=8?"#16a34a": s>=6?"#65a30d": s>=4?"#ca8a04":"#dc2626";

async function deriveKey(pw, salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptBlob(b64,pw){
  const raw=Uint8Array.from(atob(b64.trim()),c=>c.charCodeAt(0));
  const key=await deriveKey(pw,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(16,28)},key,raw.slice(28));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  const pw=document.getElementById('pw').value; const err=document.getElementById('err'); err.textContent="";
  let blob;
  try{ const r=await fetch('data/dashboard.enc?'+Date.now()); if(!r.ok) throw 0; blob=await r.text(); }
  catch(e){ err.textContent="Data isn't published yet — if you just set it up, wait a minute and retry."; return; }
  try{ DATA=await decryptBlob(blob,pw); }
  catch(e){ err.textContent="Wrong password. Check the DASHBOARD_PASSWORD secret (case & spaces count)."; return; }
  sessionStorage.setItem('dpw',pw);
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

function render(){
  const p=DATA.performance;
  document.getElementById('updated').textContent="updated "+DATA.generated;
  const eq=document.getElementById('equity');
  eq.textContent = p.equity!=null ? "$"+p.equity.toLocaleString(undefined,{maximumFractionDigits:0}) : money(p.total);
  const ret = p.total_return_pct!=null ? ` (${p.total_return_pct>=0?"+":""}${p.total_return_pct}%)` : "";
  document.getElementById('subpnl').innerHTML = `<span class="${cls(p.total)}">P&L ${money(p.total)}${ret}</span>`;

  const L={week:"Week",month:"Month",year:"Year",all:"All"};
  document.getElementById('chips').innerHTML=Object.keys(L).map(k=>
    `<div class="chip"><span class="v ${cls(p.realized[k])}">${money(p.realized[k])}</span><span class="k">${L[k]}</span></div>`).join('');
  document.getElementById('quickstats').innerHTML=
    `<div class="kv"><span class="mut">Win rate</span><b>${p.win_rate??"—"}%</b></div>`+
    `<div class="kv"><span class="mut">Record</span><b>${p.wins}W / ${p.losses}L</b></div>`+
    `<div class="kv"><span class="mut">Open P&L</span><b class="${cls(p.unrealized)}">${money(p.unrealized)}</b></div>`;

  drawChart('chart',p.curve,false);

  document.getElementById('holdMini').innerHTML = miniRows(DATA.holdings,"holding") ||
    "<tr><td class='mut'>No open positions.</td></tr>";
  document.getElementById('watchMini').innerHTML = (DATA.watchlist||[]).slice(0,5).map(x=>
    `<tr><td><b>${x.sym}</b></td><td>${x.price?"$"+x.price:"—"}</td>
     <td><span class="badge" style="background:${sc(x.score)}">${x.score??"?"}</span></td></tr>`).join('')
    || "<tr><td class='mut'>Watchlist empty.</td></tr>";
  document.getElementById('newsMini').textContent =
    (DATA.news&&DATA.news.summary) ? DATA.news.summary : "No summary yet (needs the news job to run).";
}
function miniRows(arr){
  return (arr||[]).slice(0,5).map(x=>{
    const pl=x.pnl_pct==null?"—":`<span class="${cls(x.pnl_pct)}">${x.pnl_pct>0?"+":""}${x.pnl_pct}%</span>`;
    return `<tr><td><b>${x.sym}</b></td><td>${pl}</td>
      <td><span class="badge" style="background:${sc(x.score)}">${x.score??"?"}</span></td></tr>`;}).join('');
}

function drawChart(id,curve,big){
  const ctx=document.getElementById(id); const pts=(curve||[]).map(p=>({x:p.date,y:p.cum}));
  const up=pts.length && pts[pts.length-1].y>=0; const col=up?'#16a34a':'#dc2626';
  const c=new Chart(ctx,{type:'line',
    data:{labels:pts.map(p=>p.x),datasets:[{data:pts.map(p=>p.y),borderColor:col,backgroundColor:col+'22',fill:true,tension:.25,pointRadius:big?3:2}]},
    options:{plugins:{legend:{display:false}},scales:{
      x:{ticks:{color:'#6b7280',maxTicksLimit:big?8:5},grid:{color:'#eef0f4'}},
      y:{ticks:{color:'#6b7280',callback:v=>"$"+v},grid:{color:'#eef0f4'}}}}});
  if(id==='chart'){ if(chart)chart.destroy(); chart=c; } else { if(modalChart)modalChart.destroy(); modalChart=c; }
}

function openModal(which){
  const p=DATA.performance; let h="";
  if(which==='graph'){
    h=`<h2>📈 Performance</h2><canvas id="bigchart" height="220"></canvas>
       <div class="chips" style="margin-top:14px">`+
       Object.entries({week:"Week",month:"Month",year:"Year",all:"All time"}).map(([k,v])=>
       `<div class="chip"><span class="v ${cls(p.realized[k])}">${money(p.realized[k])}</span><span class="k">${v}</span></div>`).join('')+`</div>`;
  }else if(which==='summary'){
    const fmt=v=> v==null?"—":"$"+v.toLocaleString(undefined,{maximumFractionDigits:0});
    const rows=[["Account value (equity)",fmt(p.equity)],["Starting capital",fmt(p.starting_capital)],
      ["Cash balance",fmt(p.balance)],["Total return",(p.total_return_pct??"—")+"%"],
      ["Total P&L",money(p.total)],["Realized (all time)",money(p.realized.all)],["Open / unrealized",money(p.unrealized)],
      ["Win rate",(p.win_rate??"—")+"%"],["Record",`${p.wins}W / ${p.losses}L`],["Avg per trade",(p.avg_pct??"—")+"%"],
      ["Best trade",p.best?`${p.best.sym} ${p.best.pct}%`:"—"],["Worst trade",p.worst?`${p.worst.sym} ${p.worst.pct}%`:"—"],
      ["$ data coverage",p.usd_coverage]];
    h="<h2>📊 Summary</h2>"+rows.map(([k,v])=>`<div class="kv"><span class="mut">${k}</span><b>${v}</b></div>`).join('');
  }else if(which==='holdings'){
    h="<h2>💼 Holdings</h2><table><tr><th>Stock</th><th>Entry→Now</th><th>P&L</th><th>Health</th></tr>"+
      (DATA.holdings||[]).map(x=>{const pl=x.pnl_pct==null?"—":`<span class="${cls(x.pnl_pct)}">${x.pnl_pct>0?"+":""}${x.pnl_pct}%${x.pnl_usd!=null?" ("+money(x.pnl_usd)+")":""}</span>`;
        return `<tr><td><b>${x.sym}</b></td><td>$${x.entry} → ${x.price?"$"+x.price:"—"}</td><td>${pl}</td>
        <td><span class="badge" style="background:${sc(x.score)}">${x.score??"?"}</span> <span class="mut small">${x.verdict||""}</span></td></tr>`;}).join('')
      +"</table>";
    if(!(DATA.holdings||[]).length) h="<h2>💼 Holdings</h2><p class='mut'>No open positions. Log a buy in the bot.</p>";
  }else if(which==='watch'){
    h="<h2>👁 Watchlist</h2><table><tr><th>Stock</th><th>Price</th><th>Setup</th><th>Health</th></tr>"+
      (DATA.watchlist||[]).map(x=>`<tr><td><b>${x.sym}</b></td><td>${x.price?"$"+x.price:"—"}</td><td>${x.setup||"—"}</td>
        <td><span class="badge" style="background:${sc(x.score)}">${x.score??"?"}</span></td></tr>`).join('')+"</table>";
    if(!(DATA.watchlist||[]).length) h="<h2>👁 Watchlist</h2><p class='mut'>Empty. Add with /watch in the bot.</p>";
  }else if(which==='news'){
    h=`<h2>📰 News</h2><div class="news-sum" dir="auto" style="margin-bottom:12px">${(DATA.news&&DATA.news.summary)||"No summary."}</div>`+
      (DATA.news&&DATA.news.items||[]).map(it=>`<div class="kv"><span><span class="mut small">[${it.sym}]</span> ${it.link?`<a href="${it.link}" target="_blank" rel="noopener">${it.title}</a>`:it.title}</span></div>`).join('');
  }
  document.getElementById('modalbody').innerHTML=h;
  document.getElementById('modal').classList.add('show');
  if(which==='graph') drawChart('bigchart',p.curve,true);
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

window.addEventListener('load',()=>{
  const pw=sessionStorage.getItem('dpw');
  if(pw){ document.getElementById('pw').value=pw; unlock(); }
  document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') unlock(); });
});
</script>
</body>
</html>
